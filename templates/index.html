<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Transformer Chess Engine Workspace</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"
    />
    <style>
      body {
        background: #1e1e1e;
        color: #fff;
        padding-top: 30px;
      }
      #myBoard {
        width: 440px;
        margin: 0 auto;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6);
      }
      .control-panel {
        background: #2d2d2d;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #444;
      }
      .log-box {
        background: #111;
        height: 180px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #333;
      }
      .result-highlight {
        background: #223e22;
        border: 1px solid #3e6b3e;
        padding: 12px;
        border-radius: 6px;
      }
      .status-error {
        color: #ff8f8f;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid px-5">
      <div class="row mb-3">
        <div class="col-12 text-center">
          <h2>Model Tournament Live Dashboard</h2>
          <p class="text-muted">
            Real-time visualization tracking your background tournament thread
          </p>
        </div>
      </div>

      <div class="row justify-content-center g-4">
        <div class="col-md-5">
          <div id="myBoard"></div>
          <div id="liveMoveFeed" class="text-center mt-3 text-warning fw-bold">
            Board Idling...
          </div>
        </div>

        <div class="col-md-6">
          <div class="control-panel">
            <h4>Tournament Settings</h4>
            <hr style="border-color: #444" />

            <div class="row align-items-end mb-3">
              <div class="col-md-7">
                <label class="form-label">Target Evaluation Agent:</label>
                <select
                  id="oppSelect"
                  class="form-select bg-dark text-white border-secondary"
                >
                  <option value="random">Pure Random Bot (Elo ~100)</option>
                  <option value="stockfish_depth_1">
                    Stockfish Depth 1 (Elo ~600)
                  </option>
                </select>
              </div>
              <div class="col-md-5">
                <button id="runBtn" class="btn btn-success w-100">
                  Run 20-Game Loop
                </button>
              </div>
            </div>

            <h5 class="mt-4">Live Game Series Logs</h5>
            <div id="logBox" class="log-box mb-3">
              Logs will populate as matches finish...
            </div>

            <div id="finalMetrics" class="result-highlight d-none mt-3">
              <h5 class="text-success text-center">
                Final benchmark results calculated
              </h5>
              <div class="row text-center mt-2">
                <div class="col-4">
                  <h6>Record (W-L-D)</h6>
                  <span id="resRecord" class="fw-bold fs-5"></span>
                </div>
                <div class="col-4">
                  <h6>Win %</h6>
                  <span id="resPct" class="fw-bold fs-5"></span>
                </div>
                <div class="col-4">
                  <h6>Estimated ELO</h6>
                  <span id="resElo" class="fw-bold text-warning fs-5"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
      var board = Chessboard("myBoard", {
        position: "start",
        pieceTheme:
          "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
      });
      var statusInterval = null;

      function pollStatus() {
        fetch("/get_status")
          .then((res) => res.json())
          .then((data) => {
            // 1. Keep layout in sync with current fen while running
            if (data.is_running) {
              board.position(data.current_fen);
              if (data.last_move) {
                $("#liveMoveFeed").html(
                  `Game #${data.current_game}/20 | ${data.mover} played: ${data.last_move}`,
                );
              } else {
                $("#liveMoveFeed").html(
                  `Game #${data.current_game}/20 | Setting up board...`,
                );
              }
            }

            // 2. Render completed game history logs dynamically
            if (data.logs && data.logs.length > 0) {
              var htmlLogs = "";
              data.logs.forEach((log) => {
                htmlLogs += "<div>" + log + "</div>";
              });
              $("#logBox").html(htmlLogs);
              $("#logBox").scrollTop($("#logBox")[0].scrollHeight);
            }

            // 3. Catch structural termination and output metrics card
            if (!data.is_running && data.final_results) {
              clearInterval(statusInterval);
              board.position(data.current_fen);
              $("#runBtn").prop("disabled", false);
              $("#liveMoveFeed").html("Tournament sequence complete.");

              $("#resRecord").html(data.final_results.record);
              $("#resPct").html(data.final_results.win_pct);
              $("#resElo").html(data.final_results.elo);
              $("#finalMetrics").removeClass("d-none");
            } else if (!data.is_running && data.logs && data.logs.length > 0) {
              clearInterval(statusInterval);
              $("#runBtn").prop("disabled", false);
              $("#liveMoveFeed")
                .addClass("status-error")
                .html("Tournament stopped before final metrics were produced.");
            }
          });
      }

      $("#runBtn").on("click", function () {
        $("#runBtn").prop("disabled", true);
        $("#liveMoveFeed").removeClass("status-error");
        $("#finalMetrics").addClass("d-none");
        $("#logBox").html(
          '<div class="text-muted">Starting background processing threads...</div>',
        );

        fetch("/start_tournament", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ opponent_type: $("#oppSelect").val() }),
        })
          .then((res) => res.json())
          .then(() => {
            // Check status every 200ms to smoothly render the live updates
            statusInterval = setInterval(pollStatus, 200);
          });
      });
    </script>
  </body>
</html>
