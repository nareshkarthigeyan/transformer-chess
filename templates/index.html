<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transformer Chess Engine</title>
    <!-- Include CDN styling and scripts for Chessboard.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: #fff; }
        #board { width: 450px; margin: 20px auto; }
        .status-container { font-size: 1.2rem; margin-top: 10px; min-height: 30px; }
    </style>
</head>
<body>

    <h1>🤖 Transformer Chess AI</h1>
    <div id="board"></div>
    <div class="status-container" id="status">Your turn! Move a white piece.</div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            // Only allow human to drag white pieces
            if (piece.search(/^b/) !== -1) return false;
        }

        function makeAIMove () {
            $status.html('🤖 AI is calculating...');
            
            $.ajax({
                url: '/move',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ fen: game.fen() }),
                success: function (response) {
                    if (response.status === 'success') {
                        game.move({ from: response.from, to: response.to, promotion: 'q' });
                        board.position(game.fen());
                        $status.html('AI played: ' + response.san + '. Your turn!');
                        
                        if (game.game_over()) {
                            $status.html('Game Over!');
                        }
                    } else {
                        $status.html('Game over or error.');
                    }
                }
            });
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // auto-promote to queen for speed
            });

            if (move === null) return 'snapback';

            $status.html('Moved to ' + target);
            window.setTimeout(makeAIMove, 250);
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = ChessBoard('board', config);
    </script>
</body>
</html>
